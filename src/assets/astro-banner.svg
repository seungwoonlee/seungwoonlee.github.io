  <rect width="1200" height="630" fill="url(#paint1_radial)" fill-opacity="0.5"/>
  
  <!-- Abstract Tech Grid -->
  <path d="M0 100H1200M0 200H1200M0 300H1200M0 400H1200M0 500H1200" stroke="white" stroke-opacity="0.05" stroke-width="1"/>
  <path d="M100 0V630M200 0V630M300 0V630M400 0V630M500 0V630M600 0V630M700 0V630M800 0V630M900 0V630M1000 0V630M1100 0V630" stroke="white" stroke-opacity="0.05" stroke-width="1"/>

